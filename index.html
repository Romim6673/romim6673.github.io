<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5ddd5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#login{
background:white;
padding:20px;
border-radius:10px;
width:300px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#25D366;
border:none;
color:white;
font-size:16px;
border-radius:5px;
}

#chat{
display:none;
width:100%;
max-width:500px;
height:100vh;
flex-direction:column;
background:white;
}

#header{
background:#075E54;
color:white;
padding:15px;
font-size:18px;
}

#messages{
flex:1;
padding:10px;
overflow:auto;
}

.message{
background:#dcf8c6;
padding:8px;
border-radius:8px;
margin:5px 0;
max-width:70%;
}

#inputArea{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

#msg{
flex:1;
}

</style>

</head>

<body>

<div id="login">

<h3>Login</h3>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Enter Chat</button>

</div>

<div id="chat">

<div id="header">Private Chat</div>

<div id="messages"></div>

<div id="inputArea">

<input id="msg" placeholder="Type message">

<button onclick="send()">Send</button>

</div>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u!="" && p!=""){

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="flex"

}

}

function send(){

let text=document.getElementById("msg").value

if(text=="") return

let div=document.createElement("div")

div.className="message"

div.innerText=text

document.getElementById("messages").appendChild(div)

document.getElementById("msg").value=""

}

</script>

</body>

</html>

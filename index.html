<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5ddd5;
}

#login{
text-align:center;
margin-top:120px;
}

#chat{
display:none;
height:100vh;
flex-direction:column;
}

#header{
background:#075E54;
color:white;
padding:15px;
font-size:18px;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
padding:10px;
margin:6px;
max-width:65%;
border-radius:8px;
}

.me{
background:#dcf8c6;
margin-left:auto;
}

.other{
background:white;
}

#inputArea{
display:flex;
padding:10px;
background:#f0f0f0;
}

#msg{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

button{
background:#25D366;
border:none;
padding:10px 15px;
border-radius:20px;
color:white;
}

</style>

</head>

<body>

<div id="login">

<h2>Enter Username</h2>

<input id="name" placeholder="Username">

<br><br>

<button onclick="start()">Enter Chat</button>

</div>

<div id="chat">

<div id="header">Private Chat</div>

<div id="messages"></div>

<div id="inputArea">

<input id="msg" placeholder="Type message">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let username=""

function start(){

username=document.getElementById("name").value

if(username!="katis1" && username!="kittyis1"){

alert("Username not allowed")

return

}

document.getElementById("login").style.display="none"

document.getElementById("chat").style.display="flex"

}

function send(){

let text=document.getElementById("msg").value

if(text=="") return

let div=document.createElement("div")

div.classList.add("msg")

if(username=="katis1"){
div.classList.add("me")
}else{
div.classList.add("other")
}

div.innerHTML="<b>"+username+"</b><br>"+text

document.getElementById("messages").appendChild(div)

document.getElementById("msg").value=""

}

</script>

</body>
</html>

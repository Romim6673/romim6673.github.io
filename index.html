<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Chat</title>

<style>

body{
font-family:Arial;
background:#e5ddd5;
margin:0;
}

#login{
text-align:center;
margin-top:120px;
}

#chat{
display:none;
height:100vh;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
padding:8px;
margin:5px;
max-width:60%;
border-radius:8px;
}

.me{
background:#dcf8c6;
margin-left:auto;
}

.other{
background:white;
}

#inputArea{
display:flex;
padding:10px;
background:white;
}

#msg{
flex:1;
padding:10px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<div id="login">

<h2>Enter Chat</h2>

<input id="name" placeholder="Username">

<button onclick="start()">Start Chat</button>

</div>

<div id="chat">

<div id="messages"></div>

<div id="inputArea">

<input id="msg" placeholder="Type message">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let username=""

function start(){

username=document.getElementById("name").value

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="flex"

}

</script>

</body>
</html>
